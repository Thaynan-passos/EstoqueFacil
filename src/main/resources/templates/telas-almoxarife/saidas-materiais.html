<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Saída de Materiais</title>

    <style>

        body {
            color: #ffffff;
            margin: 0;
            background-color: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            margin-left: 275px;
            width: calc(100% - 275px);
            height: 85px;
            background-color: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            display: flex;
            align-items: center;
            padding-left: 35px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        #titulo-header {
            color: #1f1f1f;
            font-size: 28px;
            font-weight: bold;
        }

        #painel {
            position: fixed;
            top: 0;
            left: 0;
            width: 275px;
            height: 100vh;
            background: linear-gradient(180deg, #0a4da3 0%, #032049 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45px;
        }

        #titulo1 {
            color: white;
            font-size: 30px;
        }

        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 35px;
        }

        .menu-btn{
            width:210px;
            height:42px;
            color:white;
            text-decoration:none;
            display:flex;
            align-items:center;
            padding-left:18px;
            margin-bottom:12px;
            border-radius:4px;
        }

        .menu-btn:hover{
            background-color:rgba(255,255,255,0.12);
        }

        .menu-btn.active{
            background-color:rgba(255,255,255,0.20);
        }

        section{
            margin-left:305px;
            margin-right:35px;
            margin-top:30px;
            background:white;
            border-radius:6px;
            padding:35px;
            color:#333;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group.full-width{
            grid-column:span 2;
        }

        label{
            font-weight:bold;
            margin-bottom:8px;
            color:#444;
        }

        input,select,textarea{
            padding:12px;
            border:1px solid #d0d0d0;
            border-radius:4px;
            background:#fafafa;
        }

        textarea{
            resize:vertical;
            min-height:120px;
        }

        .botoes-acao{
            margin-top:25px;
            display:flex;
            justify-content:flex-end;
            gap:15px;
        }

        .btn-salvar{
            background:#0a4da3;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:4px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn-cancelar{
            background:white;
            border:1px solid #d0d0d0;
            padding:12px 25px;
            border-radius:4px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div id="painel">

    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Almoxarife</span>

    <a th:href="@{/dashboard-almoxarife}" class="menu-btn">Dashboard</a>

    <a th:href="@{/controle-estoque}" class="menu-btn">Controle de Estoque</a>

    <a th:href="@{/entrada-materiais}" class="menu-btn">Entrada de Materiais</a>

    <a th:href="@{/saida-materiais}" class="menu-btn">Saída de Materiais</a>

    <a th:href="@{/inventario}" class="menu-btn">Inventário</a>

</div>

<header>
    <h1 id="titulo-header">Saída de Materiais</h1>
</header>

<section>

    <form>

        <div class="form-grid">

            <div class="form-group">
                <label>Produto</label>
                <select>
                    <option>Selecione...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantidade</label>
                <input type="number">
            </div>

            <div class="form-group">
                <label>Solicitante</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Setor</label>
                <input type="text">
            </div>

            <div class="form-group full-width">
                <label>Observações</label>
                <textarea></textarea>
            </div>

        </div>

        <div class="botoes-acao">
            <button class="btn-cancelar" type="button">Cancelar</button>
            <button class="btn-salvar" type="submit">Registrar Saída</button>
        </div>

    </form>

</section>

</body>
</html>
