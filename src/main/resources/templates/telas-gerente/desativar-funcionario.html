<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Funcionários - Estoque Fácil</title>

    <link rel="stylesheet"
          th:href="@{/css/desativar-funcionario.css}">
</head>

<body>

<div id="painel">

    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Gerente</span>

    <a th:href="@{/dashboard-gerente}" class="menu-btn">
        Dashboard
    </a>

    <a th:href="@{/analise-gerente}" class="menu-btn">
        Análise Gerente
    </a>

    <a th:href="@{/cadastro-funcionario}" class="menu-btn">
        Cadastrar Funcionário
    </a>


    <a th:href="@{/relatorio-financeiro}" class="menu-btn">
        Relatório Financeiro
    </a>

    <a th:href="@{/cadastrar-fornecedor}" class="menu-btn">
        Fornecedores
    </a>

    <a th:href="@{/desativar-funcionario}" class="menu-btn">
        Gerenciar Funcionários
    </a>


</div>

<header>

    <div>

        <h1 id="historico">
            Gerenciar Funcionários
        </h1>

        <p>
            Ative ou desative funcionários cadastrados.
        </p>

    </div>

</header>

<section>

    <div class="area-filtros">

        <input
                type="text"
                id="busca"
                class="input-filtro"
                placeholder="Buscar por nome ou CPF">

        <button
                class="btn-filtrar"
                onclick="filtrar()">

            Buscar

        </button>

    </div>

    <table>

        <thead>

        <tr>

            <th>ID</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Status</th>
            <th>Ações</th>

        </tr>

        </thead>

        <tbody id="tabelaFuncionarios">

        <tr th:each="funcionario : ${funcionarios}">

            <td th:text="${funcionario.idFuncionario}"></td>

            <td th:text="${funcionario.nome}"></td>

            <td th:text="${funcionario.cpf}"></td>

            <td>

              <span
                      th:if="${funcionario.ativo}"
                      class="status-ativo">
    Ativo
</span>

                <span
                        th:unless="${funcionario.ativo}"
                        class="status-inativo">
    Inativo
</span>
            </td>

            <td>

                <form
                        th:action="@{/desativar-funcionario/{id}(id=${funcionario.idFuncionario})}"
                        method="post">

                    <button
                            type="submit"
                            class="btn-acao"
                            th:text="${funcionario.ativo} ? 'Desativar' : 'Reativar'">

                    </button>

                </form>

            </td>

        </tr>

        </tbody>

    </table>

</section>

<script>

    function filtrar() {

        let texto = document
            .getElementById("busca")
            .value
            .toLowerCase();

        let linhas = document.querySelectorAll("#tabelaFuncionarios tr");

        linhas.forEach(function(linha){

            let nome = linha.cells[1].innerText.toLowerCase();
            let cpf = linha.cells[2].innerText.toLowerCase();

            let mostrar =
                nome.includes(texto) ||
                cpf.includes(texto);

            linha.style.display =
                mostrar ? "" : "none";

        });

    }

</script>

</body>
</html>
