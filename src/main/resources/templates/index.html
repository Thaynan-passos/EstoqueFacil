<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Estoque Fácil</title>
    <style>
        body { margin: 0; background-color: #ffffff; font-family: Arial, sans-serif; }
        .planoFundo {
            background-image: url("https://fabrimetalarmazenagem.com.br/wp-content/uploads/2025/06/Fabrimetal-Pauta-1-Prateleiras-industriais-solucao-pratica-para-a-eficiencia-do-almoxarifado.jpg");
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; height: 100vh; position: relative;
        }
        .planoFundo::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: inherit; filter: blur(5px); transform: scale(1.1); z-index: 0;
        }
        form {
            width: 350px; padding: 40px; background: #0a4da3; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1; color: white;
        }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: none; border-radius: 6px; box-sizing: border-box; }
        .btn-entrar {
            width: 100%; padding: 12px; background: white; color: #0a4da3; border: none; 
            border-radius: 6px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="planoFundo">
        <form action="#" method="POST">
            <h1>Login</h1>
            <label>CPF do Funcionário:</label>
            <input type="text" name="cpf" placeholder="000.000.000-00" required>
            <label>Senha:</label>
            <input type="password" name="senha" placeholder="••••••••" required>
            <button type="submit" class="btn-entrar">Entrar</button>
        </form>
    </div>
</body>
</html>
