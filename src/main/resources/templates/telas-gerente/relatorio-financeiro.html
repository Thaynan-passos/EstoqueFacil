<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
		<meta charset="UTF-8">
		<title>Relatório Financeiro - Estoque Fácil</title>
		<style>
				body { color: #222; margin: 0; background-color: #f4f6f9; font-family: Arial, Helvetica, sans-serif; }
				#painel { position: fixed; top:0; left:0; width:275px; height:100vh; background: linear-gradient(180deg,#0a4da3 0%,#032049 100%); display:flex; flex-direction:column; align-items:center; padding-top:45px; box-shadow:2px 0 8px rgba(0,0,0,0.25); }
				#titulo1 { color: white; font-size: 28px; margin-bottom:8px; }
				span.subtitle { color: rgba(255,255,255,0.9); font-size:14px; font-weight:bold; text-align:center; margin-bottom:30px; display:block }
				.menu-btn { width:210px; height:42px; margin-bottom:12px; border:none; border-radius:4px; background-color:transparent; color:white; font-size:14px; font-weight:bold; text-align:left; padding-left:18px; cursor:pointer; }
				header { margin-left: 275px; width: calc(100% - 275px); height: 85px; background-color: #ffffff; border-bottom: 1px solid #dcdcdc; display:flex; align-items:center; padding-left:35px; box-shadow:0 2px 6px rgba(0,0,0,0.05);}
				section { margin-left:305px; margin-top:30px; margin-right:35px; background-color:#ffffff; border-radius:6px; padding:25px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:30px; }
				.filtros { display:flex; gap:12px; align-items:center; margin-bottom:18px }
				.input-filtro, .select-filtro { padding:10px; border:1px solid #d0d0d0; border-radius:4px; font-size:13px }
				.btn-acao { background:#0a4da3; color:white; padding:10px 14px; border-radius:4px; border:none; cursor:pointer }
				.grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:18px }
				.card { background:#fff; border-radius:6px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06) }
				.valor-grande { font-size:28px; font-weight:bold; color:#0a4da3 }
				table { width:100%; border-collapse:collapse }
				th, td { padding:10px; border-bottom:1px solid #eee; text-align:left }
				thead { background:#f7f9fb }
		</style>
</head>
<body>
	<div id="painel">
		<h1 id="titulo1">Estoque Fácil</h1>
		<span class="subtitle">Painel Financeiro</span>
		<a th:href="@{/dashboard-gerente}" class="menu-btn">
			Dashboard
		</a>

		<a th:href="@{/analise-gerente}" class="menu-btn">
			Análise Gerente
		</a>

		<a th:href="@{/cadastro-funcionario}" class="menu-btn">
			Cadastrar Funcionário
		</a>

		<a th:href="@{/relatorio-financeiro}" class="menu-btn ">
			Relatório Financeiro
		</a>
		<a th:href="@{/fornecedores}" class="menu-btn">Fornecedores</a>
	</div>

	<header>
		<div>
			<h1 id="historico">Relatório Financeiro</h1>

		</div>
	</header>

	<section>
		<div class="filtros">
			<input id="periodoInicio" type="date" class="input-filtro">
			<input id="periodoFim" type="date" class="input-filtro">
			<select id="tipo" class="select-filtro">
				<option value="">Todos os tipos</option>
				<option value="entrada">Entrada (Compras)</option>
				<option value="saida">Saída (Uso/Venda)</option>
			</select>
			<button class="btn-acao" onclick="aplicarFiltro()">Aplicar</button>
		</div>

		<div class="grid">
			<div class="card">
				<div>Total Entradas</div>
				<div class="valor-grande" id="totalEntradas">R$ 0,00</div>
			</div>
			<div class="card">
				<div>Total Saídas</div>
				<div class="valor-grande" id="totalSaidas">R$ 0,00</div>
			</div>

		</div>

		<div>
			<a th:href="@{/relatorio-financeiro/pdf}" class="btn-acao">
				Baixar PDF
			</a>
		</div>

		<div class="card" style="margin-bottom:18px">
			<h3>Lançamentos</h3>
			<table>
				<thead>
					<tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Valor (R$)</th></tr>
				</thead>
				<tbody>

				<tr th:each="r : ${relatorios}">

					<td th:text="${r.dataEmissao}"></td>

					<td th:text="${r.descricao}"></td>

					<td th:text="${r.valorTotalEntrada}"></td>

					<td th:text="${r.valorTotalSaida}"></td>

				</tr>
				</tbody>

			</table>

		</div>

		<div class="card">
			<h3>Resumo por Categoria</h3>
			<div id="resumoCat">
			</div>
		</div>
	</section>

	<script>
		function aplicarFiltro() {
			const trs = document.querySelectorAll('tbody tr');

			let totalE = 0;
			let totalS = 0;

			trs.forEach(tr => {

				const entrada = parseFloat(tr.children[2].innerText.replace(',', '.')) || 0;
				const saida = parseFloat(tr.children[3].innerText.replace(',', '.')) || 0;

				totalE += entrada;
				totalS += saida;
			});

			document.getElementById('totalEntradas').innerText =
					'R$ ' + totalE.toFixed(2).replace('.', ',');

			document.getElementById('totalSaidas').innerText =
					'R$ ' + totalS.toFixed(2).replace('.', ',');

		}
	</script>
</body>
</html>
