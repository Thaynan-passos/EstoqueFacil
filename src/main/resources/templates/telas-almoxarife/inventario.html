<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventário - Estoque Fácil</title>
    <style>
        body { color: #333; margin: 0; background-color: #f4f6f9; font-family: Arial, Helvetica, sans-serif; }
        #painel { position: fixed; top: 0; left: 0; width: 275px; height: 100vh; background: linear-gradient(180deg, #0a4da3 0%, #032049 100%); display: flex; flex-direction: column; align-items: center; padding-top: 45px; box-shadow: 2px 0 8px rgba(0,0,0,0.25); }
        #titulo1 { color: white; font-size: 30px; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.85); font-size: 16px; font-weight: bold; text-align: center; letter-spacing: 1px; margin-bottom: 35px; display: block; }
        .menu-btn { width: 210px; height: 42px; margin-bottom: 12px; border-radius: 4px; color: white; text-decoration: none; font-size: 14px; font-weight: bold; display: flex; align-items: center; padding-left: 18px; box-sizing: border-box; transition: background-color 0.2s; }
        .menu-btn:hover { background-color: rgba(255,255,255,0.12); }
        .menu-btn.active { background-color: rgba(255,255,255,0.20); }
        header { margin-left: 275px; width: calc(100% - 275px); height: 85px; background-color: #ffffff; border-bottom: 1px solid #dcdcdc; display: flex; align-items: center; padding-left: 35px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        #titulo-header { color: #1f1f1f; font-size: 28px; font-weight: bold; margin: 0; }
        section { margin-left: 305px; margin-top: 30px; margin-right: 35px; background: white; border-radius: 6px; padding: 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .filtros { display: flex; gap: 15px; margin-bottom: 25px; }
        .filtros input, .filtros select { padding: 12px; border: 1px solid #d0d0d0; border-radius: 4px; }
        .tabela-box { background: white; border-radius: 6px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #0a4da3; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ececec; }
        tbody tr:hover { background: #f7f9fc; }
    </style>
</head>
<body>

    <div id="painel">
        <h1 id="titulo1">Estoque Fácil</h1>
        <span class="subtitle">Painel Almoxarife</span>
        <a th:href="@{/dashboard-almoxarife}" class="menu-btn">Dashboard</a>
        <a th:href="@{/controle-estoque}" class="menu-btn">Controle de Estoque</a>
        <a th:href="@{/entrada-materiais}" class="menu-btn">Entrada de Materiais</a>
        <a th:href="@{/saida-materiais}" class="menu-btn">Saída de Materiais</a>
        <a th:href="@{/inventario}" class="menu-btn active">Inventário</a>
        <a th:href="@{/cadastrar-produto}" class="menu-btn">Cadastrar Produto</a>
    </div>

    <header>
        <h1 id="titulo-header">Inventário</h1>
    </header>

    <section>
        <div class="filtros">
            <input type="text" placeholder="Pesquisar produto">
            <select><option>Todas Categorias</option></select>
            <select><option>Todos Fornecedores</option></select>
        </div>

        <div class="tabela-box">
            <table>
                <thead>
                    <tr><th>Código</th><th>Produto</th><th>Categoria</th><th>Quantidade</th><th>Status</th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${produtos}">
                        <td th:text="${p.idProduto}"></td>
                        <td th:text="${p.nomeProduto}"></td>
                        <td th:text="${p.classificacao}"></td>
                        <td><span style="color:#999;">(sem controle ainda)</span></td>
                        <td><span>Indefinido</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

</body>
</html>
