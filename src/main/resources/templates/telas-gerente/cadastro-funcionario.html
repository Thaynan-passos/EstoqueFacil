<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Cadastro de Funcionários</title>
</head>
<body>
    <div id="painel">
        <h1>Estoque Fácil</h1><span>Gerência</span>
        <button class="menu-btn active">Funcionários</button>
    </div>
    <main>
        <header><h1>Gestão de Funcionários</h1></header>
        <section>
            <form class="form-grid">
                <div class="form-group"><label>Nome</label><input type="text" placeholder="Ex: Fulano de Tal" required></div>
                <div class="form-group"><label>CPF</label><input type="text" placeholder="000.000.000-00" required></div>
                <div class="botoes-acao"><button class="btn btn-primary" type="submit">Salvar Funcionário</button></div>
            </form>
        </section>
        <section>
            <h2>Funcionários Cadastrados</h2>
            <table>
                <thead><tr><th>Nome</th><th>Ação</th></tr></thead>
                <tbody>
                    <tr><td>Fulano de Tal</td><td><button class="btn btn-warning" onclick="alert('Histórico preservado.')">Inativar</button></td></tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
