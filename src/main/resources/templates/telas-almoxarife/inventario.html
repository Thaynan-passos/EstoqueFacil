<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventário</title>

    <link rel="stylesheet" href="/static/css/inventario.css"  th:href="@{/css/inventario.css}"/>
</head>

<body>

<div id="painel">

    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Almoxarife</span>

    <a th:href="@{/dashboard-almoxarife}" class="menu-btn">Dashboard do almoxarifado</a>

    <a th:href="@{/controle-estoque}" class="menu-btn">Controle de Estoque</a>

    <a th:href="@{/entrada-materiais}" class="menu-btn">Entrada de Materiais</a>

    <a th:href="@{/saidas-materiais}" class="menu-btn">Saída de Materiais</a>

    <a th:href="@{/inventario}" class="menu-btn">Inventário do almoxarifado</a>
    <a th:href="@{/cadastrar-produto}" class="menu-btn">
        Cadastrar um Produto
    </a>
</div>

<header>
    <h1 id="titulo-header">Inventário</h1>
</header>

<section>

    <div class="filtros">

        <input id="busca" type="text" placeholder="Pesquisar produto">

        <select>
            <option>Todas Categorias</option>
        </select>

        <select>
            <option>Todos Fornecedores</option>
        </select>
        <select id="categoria-filtro">

            <option value="">Todas Categorias</option>

            <option
                    th:each="categoria : ${categorias}"
                    th:value="${categoria}"
                    th:text="${categoria}">
            </option>

        </select>

    </div>

    <div class="inventario-total" style="margin: 16px 0; font-weight: bold;">
        Total geral no estoque: <span th:text="${totalQuantidadeEstoque}">0</span>
    </div>

    <div class="tabela-box">

        <table>

            <thead>
            <tr>
                <th>Código</th>
                <th>Produto</th>
                <th>Categoria</th>
                <th>Quantidade</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>

        <tr th:each="item : ${inventario}">

            <td th:text="${item.produto.idProduto}"></td>

            <td th:text="${item.produto.nome}"></td>

            <td th:text="${item.produto.classificacao}"></td>

            <td th:text="${item.quantidadeTotal}"></td>

            <td>

        <span th:if="${item.quantidadeTotal == 0}"
              style="color:red;">
            Sem estoque
        </span>

                <span th:if="${item.quantidadeTotal > 0 and item.quantidadeTotal <= 10}"
                      style="color:orange;">
            Baixo estoque
        </span>

                <span th:if="${item.quantidadeTotal > 10}"
                      style="color:green;">
            Disponível
        </span>

            </td>

        </tr>

        </tbody>
        </table>

    </div>

</section>

<script>
    function filtrarInventario() {
        const texto = document.getElementById('busca').value.toLowerCase();
        const categoria = document.getElementById('categoria-filtro').value.toLowerCase();

        const linhas = document.querySelectorAll('.tabela-box table tbody tr');
        linhas.forEach(row => {
            const produto = row.cells[1]?.innerText.toLowerCase() || '';
            const categoriaRow = row.cells[2]?.innerText.toLowerCase() || '';

            const matchesTexto = texto === '' || produto.includes(texto);
            const matchesCategoria = categoria === '' || categoriaRow === categoria;

            row.style.display = matchesTexto && matchesCategoria ? '' : 'none';
        });
    }

    document.getElementById('busca').addEventListener('input', filtrarInventario);
    document.getElementById('categoria-filtro').addEventListener('change', filtrarInventario);
</script>

</body>
</html>
