<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Minhas Solicitações</title>
</head>
<body>
    <div id="painel">
        <h1>Estoque Fácil</h1><span>Funcionário</span>
        <button class="menu-btn active">Minhas Solicitações</button>
    </div>
    <main>
        <header><h1>Acompanhamento de Pedidos</h1></header>
        <section>
            <input type="text" id="filtro" placeholder="Filtrar pedidos..." onkeyup="filtrar()" style="margin-bottom: 20px; padding: 10px; width: 100%;">
            <table id="tabela-pedidos">
                <thead><tr><th>Pedido</th><th>Item</th><th>Status</th><th>Ações</th></tr></thead>
                <tbody>
                    <tr><td>REQ-041</td><td>Cadeira Ergonômica</td><td><span class="badge b-rejeitado">Rejeitado</span></td>
                        <td><button class="btn btn-primary" onclick="alert('Dados carregados para nova solicitação!')">Reaproveitar Pedido</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <script>
        function filtrar() {
            let v = document.getElementById("filtro").value.toLowerCase();
            let trs = document.getElementById("tabela-pedidos").getElementsByTagName("tr");
            for (let i = 1; i < trs.length; i++) {
                trs[i].style.display = trs[i].innerText.toLowerCase().includes(v) ? "" : "none";
            }
        }
    </script>
</body>
</html>
