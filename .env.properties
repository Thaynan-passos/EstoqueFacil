# ==============================================
# CONFIGURAÇÃO DE BANCO DE DADOS
# ==============================================
# Host do MySQL (localhost se for local)
MYSQL_HOST=localhost

# Nome do banco de dados
MYSQL_DATABASE=estoquefacil

# Usuário do MySQL
MYSQL_USER=root

# Senha do MySQL (ajuste conforme sua configuração)
MYSQL_PASSWORD=senha_do_mysql

# ==============================================
# CONFIGURAÇÃO DE EMAIL (Gmail SMTP)
# ==============================================
# Host SMTP do email
MAIL_HOST=smtp.gmail.com

# Porta SMTP
MAIL_PORT=587

# Email que será usado para enviar notificações
MAIL_USERNAME=seu_email@gmail.com

# Senha de aplicativo do Gmail (gerar em: myaccount.google.com/apppasswords)
# NÃO use a senha do Gmail, use a senha de aplicativo!
MAIL_PASSWORD=sua_senha_app_gmail
