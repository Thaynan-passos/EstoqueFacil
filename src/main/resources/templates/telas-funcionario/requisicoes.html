<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Requisição - Estoque Fácil</title>
    <link rel="stylesheet" href="/static/css/requisicoes.css" th:href="@{/css/requisicoes.css}"/>
</head>
<body>
<div id="painel">
    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Área do Financeiro</span>
    <a th:href="@{/dashboard-funcionario}" class="menu-btn">
        Dashboard financeiro
    </a>
    <a th:href="@{/requisicoes}" class="menu-btn">
        Pedir uma nova Requisição
    </a>
    <a th:href="@{/historico-requisicoes}" class="menu-btn">
        Histórico de requisições
    </a>
    <a th:href="@{/minhas-solicitacoes}" class="menu-btn">
        Minhas Solicitações
    </a>
</div>
<header>
    <div>
        <h1 id="titulo-header">Nova Requisição de Material</h1>
    </div>
</header>
<section>
    <form id="form-requisicao" th:action="@{/requisicao}" th:object="${requisicao}" method="post">
        <div id="mensagem" class="mensagem-escondida"></div>
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="produto">Produto Desejado</label>
                <select id="produto" name="produto" required>
                    <option value="" disabled selected>Busque e selecione o produto...</option>
                    <option th:each="p : ${produtos}"
                            th:value="${p.idProduto}"
                            th:text="${p.nome}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" name="quantidade" min="1" placeholder="Ex: 2" required>
            </div>
            <div class="form-group">
                <label for="urgencia">Nível de Urgência</label>
                <select id="urgencia" name="urgencia" required>
                    <option value="baixa">Baixa (Rotina)</option>
                    <option value="media">Média</option>
                    <option value="alta">Alta (Impacta o trabalho)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="setor">Setor</label>
                <select id="setor" name="setor" required>
                    <option value="" disabled selected>Selecione o setor...</option>
                    <option th:each="s : ${setores}" th:value="${s.idSetor}" th:text="${s.nome}"></option>
                </select>
            </div>
            <div class="form-group full-width">
                <label for="justificativa">Justificativa da Solicitação</label>
                <textarea id="justificativa" name="justificativa" placeholder="Explique brevemente o motivo pelo qual você precisa deste material." required></textarea>
            </div>
        </div>
        <div class="botoes-acao">
            <button type="reset" class="btn-cancelar">Limpar Campos</button>
            <button type="submit" class="btn-salvar">Enviar Solicitação</button>
        </div>
    </form>
</section>

<div id="popup-sucesso" class="popup-escondido">
    <div class="popup-conteudo">
        <span class="fechar-popup" onclick="fecharPopup()">&times;</span>
        <p>Requisição enviada, aguarde o retorno da gerência.</p>
    </div>
</div>

<script>
    function fecharPopup() {
        const p = document.getElementById('popup-sucesso');
        if (p) p.className = 'popup-escondido';
    }

    // fechar ao clicar fora do conteúdo
    document.addEventListener('click', function (e) {
        const popup = document.getElementById('popup-sucesso');
        if (!popup) return;
        if (popup.className !== 'popup-visivel') return;
        const conteudo = popup.querySelector('.popup-conteudo');
        if (conteudo && !conteudo.contains(e.target)) {
            fecharPopup();
        }
    });

    // fechar com ESC
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') fecharPopup();
    });

    // Mensagens de sucesso/erro no formulário
    function mostrarMensagem(tipo, texto) {
        const el = document.getElementById('mensagem');
        if (!el) return;
        el.textContent = texto;
        el.className = tipo === 'sucesso' ? 'mensagem-sucesso mensagem-visivel' : 'mensagem-erro mensagem-visivel';

        // auto-hide após 5s
        clearTimeout(window._mensagemTimeout);
        window._mensagemTimeout = setTimeout(() => {
            el.className = 'mensagem-escondida';
        }, 5000);
    }

    document.getElementById("form-requisicao").addEventListener("submit", async (e) => {
        e.preventDefault();

        const produtoId = parseInt(document.getElementById("produto").value);
        const quantidade = parseInt(document.getElementById("quantidade").value);
        const justificativa = document.getElementById("justificativa").value;
        const setorEl = document.getElementById("setor");
        const setorId = setorEl ? parseInt(setorEl.value) : null;

        const requisicao = {
            dataRequisicao: new Date().toISOString().split("T")[0],
            motivo: justificativa,
            setor: { idSetor: setorId },
            produtos: [
                {
                    produto: { idProduto: produtoId },
                    quantidadeSolicitada: quantidade
                }
            ]
        };

        const response = await fetch("/requisicao", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requisicao)
        });

        if (response.ok) {
            document.getElementById("popup-sucesso").className = "popup-visivel";
            e.target.reset();
        } else {
            const erro = await response.text();
            alert("Erro ao enviar requisição: " + erro);
        }
    });
</script>
</body>
</html>
