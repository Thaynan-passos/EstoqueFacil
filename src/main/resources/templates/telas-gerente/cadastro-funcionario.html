<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Funcionário - Estoque Fácil</title>

    <style>
        body {
            color: #ffffff;
            margin: 0;
            background-color: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            margin-left: 275px;
            width: calc(100% - 275px);
            height: 85px;
            background-color: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            display: flex;
            align-items: center;
            padding-left: 35px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        #titulo-header {
            color: #1f1f1f;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        #painel {
            position: fixed;
            top: 0;
            left: 0;
            width: 275px;
            height: 100vh;
            background: linear-gradient(180deg, #0a4da3 0%, #032049 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.25);
        }

        #titulo1 {
            color: white;
            font-size: 30px;
            margin-bottom: 8px;
        }

        span.subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 35px;
            display: block;
        }

        .menu-btn {
            width: 210px;
            height: 42px;
            margin-bottom: 12px;
            border: none;
            border-radius: 4px;
            background-color: transparent;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-align: left;
            padding-left: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .menu-btn:hover {
            background-color: rgba(255,255,255,0.12);
        }

        .menu-btn.active {
            background-color: rgba(255,255,255,0.20);
        }

        section {
            margin-left: 305px;
            margin-top: 30px;
            margin-right: 35px;
            background-color: #ffffff;
            border-radius: 6px;
            padding: 35px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            color: #333;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #444;
        }

        input, select {
            padding: 12px 15px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fafafa;
        }

        input:focus, select:focus {
            border-color: #0a4da3;
            background-color: #ffffff;
        }

        .dica-campo {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .botoes-acao {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #ececec;
            padding-top: 25px;
        }

        .btn-salvar {
            background-color: #0a4da3;
            color: #ffffff;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-salvar:hover {
            background-color: #032049;
        }

        .btn-cancelar {
            background-color: #ffffff;
            color: #666;
            border: 1px solid #d0d0d0;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancelar:hover {
            background-color: #f1f3f5;
            color: #333;
        }
    </style>
</head>
<body>

  <div id="painel">
    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Administrativo</span>
      <a th:href="@{/dashboard-gerente}" class="menu-btn ">
          Dashboard
      </a>


      <a th:href="@{/analise-gerente}" class="menu-btn ">
          Análise Gerente
      </a>

      <a th:href="@{/cadastro-funcionario}" class="menu-btn ">
          Cadastrar Funcionário
      </a>

      <a th:href="@{/relatorio-financeiro}" class="menu-btn">
          Relatório Financeiro
      </a>
      <a th:href="@{/cadastrar-fornecedor}" class="menu-btn">Fornecedores</a>
  </div>

  <header>
      <div>
          <h1 id="titulo-header">Cadastro de Funcionário</h1>
      </div>
  </header>

  <section>
      <form th:action="@{/cadastro/funcionario}" method="post">
          <div class="form-grid">

              <div class="form-group full-width">
                  <label for="nome">Nome Completo</label>
                  <input type="text" id="nome" name="nome"
                         placeholder="Digite o nome completo do funcionário" required>
              </div>

              <div class="form-group">
                  <label for="cpf">CPF (Login)</label>
                  <input type="text" id="cpf" name="cpf"
                         placeholder="000.000.000-00" required>
                  <span class="dica-campo">Este CPF será utilizado no login.</span>
              </div>

              <div class="form-group">
                  <label for="senha">Senha de Acesso</label>
                  <input type="password" id="senha" name="senha"
                         placeholder="Crie uma senha inicial" required>
              </div>

              <div class="form-group">
                  <label for="email">E-mail Corporativo</label>
                  <input type="email" id="email" name="email"
                         placeholder="funcionario@empresa.com" required>
              </div>

              <div class="form-group">
                  <label for="telefone">Telefone / Celular</label>
                  <input type="text" id="telefone" name="telefone"
                         placeholder="(00) 00000-0000">
              </div>



              <div class="form-group">
                  <label for="cargo">Perfil de Acesso (Cargo)</label>
                  <select id="cargo" name="cargo" required>
                      <option value="" disabled selected>Selecione o nível de acesso...</option>
                      <option value="FINANCEIRO">Financeiro</option>
                      <option value="ALMOXARIFADO">Almoxarife</option>
                      <option value="GERENTE">Gerente</option>
                  </select>
              </div>

          </div>

          <div class="form-grid">

              <div class="form-group full-width">
                  <label for="endereco_rua">Rua</label>
                  <input type="text" id="endereco_rua" name="rua" required>
              </div>

              <div class="form-group">
                  <label for="bairro">Bairro</label>
                  <input type="text" id="bairro" name="bairro" required>
              </div>

              <div class="form-group">
                  <label for="cidade">Cidade</label>
                  <input type="text" id="cidade" name="cidade" required>
              </div>

              <div class="form-group">
                  <label for="estado">Estado (UF)</label>
                  <select id="estado" name="estado" required>
                      <option value="" disabled selected>Selecione o estado...</option>

                      <option value="AC">AC</option>
                      <option value="AL">AL</option>
                      <option value="AP">AP</option>
                      <option value="AM">AM</option>
                      <option value="BA">BA</option>
                      <option value="CE">CE</option>
                      <option value="DF">DF</option>
                      <option value="ES">ES</option>
                      <option value="GO">GO</option>
                      <option value="MA">MA</option>
                      <option value="MT">MT</option>
                      <option value="MS">MS</option>
                      <option value="MG">MG</option>
                      <option value="PA">PA</option>
                      <option value="PB">PB</option>
                      <option value="PR">PR</option>
                      <option value="PE">PE</option>
                      <option value="PI">PI</option>
                      <option value="RJ">RJ</option>
                      <option value="RN">RN</option>
                      <option value="RS">RS</option>
                      <option value="RO">RO</option>
                      <option value="RR">RR</option>
                      <option value="SC">SC</option>
                      <option value="SP">SP</option>
                      <option value="SE">SE</option>
                      <option value="TO">TO</option>
                  </select>
              </div>
            <div>
              <label for="numeroCasa">Número</label>
              <input type="text" id="numeroCasa" name="numero"
                     placeholder="Ex: 123 ou S/N" required>
          </div>

              <div class="form-group">
                  <label for="cep">CEP</label>
                  <input type="text" id="cep" placeholder="00000-000" maxlength="9" name="cep" required>
              </div>

          </div>

          <div class="botoes-acao">
              <button type="button" class="btn-cancelar">Cancelar</button>
              <button type="submit" class="btn-salvar">Cadastrar Funcionário</button>
          </div>
      </form>
  </section>

</body>
</html>
