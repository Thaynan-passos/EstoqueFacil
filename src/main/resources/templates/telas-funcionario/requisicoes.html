<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Requisição - Estoque Fácil</title>
    <style>
        body {
            color: #ffffff;
            margin: 0;
            background-color: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }
        header {
            margin-left: 275px;
            width: calc(100% - 275px);
            height: 85px;
            background-color: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            display: flex;
            align-items: center;
            padding-left: 35px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        #titulo-header {
            color: #1f1f1f;
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }
        #painel {
            position: fixed;
            top: 0;
            left: 0;
            width: 275px;
            height: 100vh;
            background: linear-gradient(180deg, #0a4da3 0%, #032049 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.25);
        }
        #titulo1 {
            color: white;
            font-size: 30px;
            margin-bottom: 8px;
        }
        span.subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 35px;
            display: block;
        }
        .menu-btn {
            width: 210px;
            height: 42px;
            margin-bottom: 12px;
            border: none;
            border-radius: 4px;
            background-color: transparent;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-align: left;
            padding-left: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .menu-btn:hover {
            background-color: rgba(255,255,255,0.12);
        }
        .menu-btn.active {
            background-color: rgba(255,255,255,0.20);
        }
        section {
            margin-left: 305px;
            margin-top: 30px;
            margin-right: 35px;
            background-color: #ffffff;
            border-radius: 6px;
            padding: 35px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            color: #333;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #444;
        }
        input, select, textarea {
            padding: 12px 15px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fafafa;
            font-family: Arial, Helvetica, sans-serif;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #0a4da3;
            background-color: #ffffff;
        }
        .botoes-acao {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #ececec;
            padding-top: 25px;
        }
        .btn-salvar {
            background-color: #0a4da3;
            color: #ffffff;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-salvar:hover {
            background-color: #032049;
        }
        .btn-cancelar {
            background-color: #ffffff;
            color: #666;
            border: 1px solid #d0d0d0;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-cancelar:hover {
            background-color: #f1f3f5;
            color: #333;
        }
        .popup-escondido {
            display: none;
        }
        .popup-visivel {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .popup-conteudo {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            color: #1f1f1f;
            font-size: 18px;
            font-weight: bold;
            max-width: 400px;
        }
        .fechar-popup {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            transition: color 0.2s;
        }
        .fechar-popup:hover {
            color: #dc3545;
        }
    </style>
</head>
<body>
  <div id="painel">
    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Área do Funcionário</span>
      <a th:href="@{/dashboard-funcionario}" class="menu-btn">
          Dashboard financeiro
      </a>

      <a th:href="@{/requisicoes}" class="menu-btn">
          Pedir uma nova Requisição
      </a>

      <a th:href="@{/historico-requisicoes}" class="menu-btn">
          Histórico de requisições
      </a>

      <a th:href="@{/minhas-solicitacoes}" class="menu-btn">
          Minhas Solicitações
      </a>
  </div>
  <header>
      <div>
          <h1 id="titulo-header">Nova Requisição de Material</h1>
      </div>
  </header>
  <section>
      <form id="form-requisicao"  th:action="@{/requisicao}" th:object="${requisicao}" method="POST">
          <div class="form-grid">
              <div class="form-group full-width">
                  <label for="produto">Produto Desejado</label>
                  <select id="produto" name="produto" required>
                      <option value="" disabled selected>Busque e selecione o produto...</option>
                      <option th:each="p : ${produtos}"
                              th:value="${p.id}"
                              th:text="${p.nome}">
                      </option>
                  </select>
              </div>
              <div class="form-group">
                  <label for="quantidade">Quantidade</label>
                  <input type="number" id="quantidade" name="quantidade" min="1" placeholder="Ex: 2" required>
              </div>
              <div class="form-group">
                  <label for="urgencia">Nível de Urgência</label>
                  <select id="urgencia" name="urgencia" required>
                      <option value="baixa">Baixa (Rotina)</option>
                      <option value="media">Média</option>
                      <option value="alta">Alta (Impacta o trabalho)</option>
                  </select>
              </div>
              <div class="form-group full-width">
                  <label for="justificativa">Justificativa da Solicitação</label>
                  <textarea id="justificativa" name="justificativa" placeholder="Explique brevemente o motivo pelo qual você precisa deste material." required></textarea>
              </div>
          </div>
          <div class="botoes-acao">
              <button type="reset" class="btn-cancelar">Limpar Campos</button>
              <button type="submit" class="btn-salvar">Enviar Solicitação</button>
          </div>
      </form>
  </section>

  <div id="popup-sucesso" class="popup-escondido">
      <div class="popup-conteudo">
          <span class="fechar-popup" onclick="fecharPopup()">&times;</span>
          <p>Requisição enviada, aguarde o retorno da gerência.</p>
      </div>
  </div>

  <script>
      document.getElementById("form-requisicao").addEventListener("submit", async (e) => {
          e.preventDefault();

          const produtoId = document.getElementById("produto").value;
          const quantidade = document.getElementById("quantidade").value;
          const justificativa = document.getElementById("justificativa").value;

          const requisicao = {
              dataRequisicao: new Date().toISOString().split("T")[0],
              status: "PENDENTE",
              motivo: justificativa,
              setor: {
                  idSetor: 1
              },
              produtos: [
                  {
                      produto: {
                          idProduto: produtoId
                      },
                      quantidadeSolicitada: quantidade
                  }
              ]
          };

          const response = await fetch("/requisicao", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json"
              },
              body: JSON.stringify(requisicao)
          });

          if (response.ok) {
              document.getElementById("popup-sucesso").className = "popup-visivel";
              e.target.reset();
          } else {
              alert("Erro ao enviar requisição");
          }
      });

  </script>
</body>
</html>
