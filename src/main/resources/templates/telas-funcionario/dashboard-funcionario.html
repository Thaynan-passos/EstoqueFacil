<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Funcionário</title>

    <style>

        body {
            color: #ffffff;
            margin: 0;
            background-color: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            margin-left: 275px;
            width: calc(100% - 275px);
            height: 85px;
            background-color: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            display: flex;
            align-items: center;
            padding-left: 35px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        #titulo-header {
            color: #1f1f1f;
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }

        #painel {
            position: fixed;
            top: 0;
            left: 0;
            width: 275px;
            height: 100vh;
            background: linear-gradient(180deg, #0a4da3 0%, #032049 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45px;
        }

        #titulo1 {
            color: white;
            font-size: 30px;
        }

        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 35px;
        }

        .menu-btn {
            width: 210px;
            height: 42px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding-left: 18px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .menu-btn:hover {
            background-color: rgba(255,255,255,0.12);
        }

        section {
            margin-left: 305px;
            margin-right: 35px;
            margin-top: 30px;
            color: #333;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h3 {
            color: #666;
            margin: 0;
        }

        .card span {
            display: block;
            margin-top: 15px;
            font-size: 36px;
            color: #0a4da3;
            font-weight: bold;
        }

        .tabela-box {
            background: white;
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0a4da3;
            color: white;
        }

        th, td {
            padding: 14px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid #ececec;
        }

        .status-aprovada {
            color: #198754;
            font-weight: bold;
        }

        .status-pendente {
            color: #fd7e14;
            font-weight: bold;
        }

        .status-recusada {
            color: #dc3545;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div id="painel">

    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Funcionário</span>

    <a th:href="@{/dashboard-funcionario}" class="menu-btn">
        Dashboard financeiro
    </a>

    <a th:href="@{/requisicoes}" class="menu-btn">
        Pedir uma nova Requisição
    </a>

    <a th:href="@{/historico-requisicoes}" class="menu-btn">
        Histórico de requisições
    </a>

    <a th:href="@{/minhas-solicitacoes}" class="menu-btn">
        Minhas Solicitações
    </a>

</div>

<header>
    <h1 id="titulo-header">Dashboard Funcionário</h1>
</header>

<section>


    <div class="cards">

        <div class="card">
            <h3>Requisições Realizadas</h3>
            <span th:text="${total}">0</span>
        </div>

        <div class="card">
            <h3>Pendentes</h3>
            <span th:text="${pendentes}">0</span>
        </div>

        <div class="card">
            <h3>Aprovadas</h3>
            <span th:text="${aprovadas}">0</span>
        </div>

        <div class="card">
            <h3>Recusadas</h3>
            <span th:text="${recusadas}">0</span>
        </div>

    </div>

    <div class="tabela-box">

        <h2>Últimas Solicitações</h2>

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Status</th>
                <th>Data</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="r : ${ultimas}">

                <td th:text="${r.idRequisicao}"></td>

                <td>
        <span th:if="${#lists.size(r.produtos) > 0}"
              th:text="${r.produtos[0].produto.nome}">
        </span>
                </td>

                <td>
        <span th:if="${#lists.size(r.produtos) > 0}"
              th:text="${r.produtos[0].quantidadeSolicitada}">
        </span>
                </td>

                <td>
        <span th:text="${r.status}"
               th:class="${r.status == T(com.EstoqueFacil.EstoqueFacil.model.Status).APROVADO ? 'status-aprovada' :
                 r.status == T(com.EstoqueFacil.EstoqueFacil.model.Status).PENDENTE ? 'status-pendente' :
                 'status-recusada'}">
</span>
                </td>
                <td th:text="${r.dataRequisicao}"></td>
            </tr>
            </tbody>

        </table>

    </div>

</section>

</body>
</html>
