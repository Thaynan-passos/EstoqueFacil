<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body{
            color: #ffffff;
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f4f6f9;
        }

        #painel{
            position: fixed;
            top: 0;
            left: 0;
            width: 275px;
            height: 100vh;
            background: linear-gradient(180deg, #0a4da3 0%, #032049 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.25);
        }

        #titulo1{
            margin:0;
            font-size:28px;
        }

        .subtitle{
            color:#d1d5db;
            margin-bottom:30px;
        }

        .menu-btn{
            display:block;
            padding:12px 15px;
            margin-bottom:10px;
            text-decoration:none;
            color:white;
            border-radius:6px;
            transition:0.2s;
        }

        .menu-btn:hover{
            background:#374151;
        }

        header{
            margin-left:250px;
            background:white;
            padding:20px 35px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        #titulo-header{
            margin:0;
            color:#1f2937;
        }

        section{
            margin-left:250px;
            padding:35px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
            margin-bottom:35px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
            transition:0.2s;
        }

        .card:hover{
            transform:translateY(-3px);
        }

        .card h3{
            margin:0;
            color:#6b7280;
            font-size:16px;
        }

        .card span{
            display:block;
            margin-top:15px;
            font-size:38px;
            font-weight:bold;
            color:#2563eb;
        }

        .atividade-recente{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        .atividade-recente h2{
            margin-top:0;
            color:#1f2937;
        }

        .atividade-recente ul{
            padding-left:20px;
        }

        .atividade-recente li{
            margin-bottom:12px;
            color:#4b5563;
        }
    </style>
</head>

<body>

<div id="painel">
    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Administrativo</span>

    <a th:href="@{/dashboard-gerente}" class="menu-btn ">
        Dashboard de gerenciamento
    </a>


    <a th:href="@{/analise-gerente}" class="menu-btn">
        Análise Gerente
    </a>

    <a th:href="@{/cadastro-funcionario}" class="menu-btn">
        Cadastrar Funcionário
    </a>

    <a th:href="@{/relatorio-financeiro}" class="menu-btn">
        Relatório Financeiro
    </a>
    <a th:href="@{/fornecedores}" class="menu-btn">Fornecedores</a>
</div>

<header>
    <div>
        <h1 id="titulo-header">Dashboard</h1>
    </div>
</header>

<section>

    <div class="cards">

        <div class="card">
            <h3>Produtos</h3>
            <span th:text="${totalProdutos}">152</span>
        </div>

        <div class="card">
            <h3>Funcionários</h3>
            <span th:text="${totalFuncionarios}">18</span>
        </div>

        <div class="card">
            <h3>Requisições</h3>
            <span th:text="${totalRequisicoes}">27</span>
        </div>

        <div class="card">
            <h3>Estoque Baixo</h3>
            <span th:text="${estoqueBaixo}">5</span>
        </div>

    </div>

    <div class="atividade-recente">

        <h2>Atividades Recentes</h2>

        <ul>
            <li th:each="a : ${atividades}" th:text="${a}"></li>
        </ul>

    </div>

</section>

</body>
</html>
