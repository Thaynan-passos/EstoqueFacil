<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Cadastro de Produto</title>
</head>
<body>
    <div id="painel">
        <h1>Estoque Fácil</h1><span>Gerência</span>
        <button class="menu-btn active">Cadastrar Produto</button>
    </div>
    <main>
        <header><h1>Cadastrar Novo Produto</h1></header>
        <section>
            <form>
                <div class="form-grid">
                    <div class="form-group full-width"><label>Nome do Produto</label><input type="text" required></div>
                    <div class="form-group">
                        <label>Fornecedor</label>
                        <div class="input-group">
                            <input type="text" list="fornecedores" placeholder="Busque ou digite...">
                            <datalist id="fornecedores"><option value="Dell"><option value="Kalunga"></datalist>
                            <button type="button" class="btn-add" onclick="alert('Pop-up: Cadastrar novo fornecedor')">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <div class="input-group">
                            <select><option>Eletrônicos</option><option>Papelaria</option></select>
                            <button type="button" class="btn-add" onclick="alert('Pop-up: Cadastrar nova categoria')">+</button>
                        </div>
                    </div>
                    <div class="form-group"><label>Quantidade (Opcional)</label><input type="number"></div>
                    <div class="form-group"><label>Valor Unitário</label><input type="number" step="0.01" required></div>
                    <div class="form-group full-width"><label>Data da Compra</label><input type="date" required></div>
                </div>
                <div class="botoes-acao"><button class="btn btn-primary" type="submit">Cadastrar Produto</button></div>
            </form>
        </section>
    </main>
</body>
</html>
