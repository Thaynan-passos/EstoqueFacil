<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minhas Solicitações</title>

    <link rel="stylesheet" href="/static/css/minhas-solicitacoes.css" th:href="@{/css/minhas-solicitacoes.css}"/>
</head>

<body>

<div id="painel">

    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Funcionário</span>

    <a th:href="@{/dashboard-funcionario}" class="menu-btn">
        Dashboard financeiro
    </a>

    <a th:href="@{/requisicoes}" class="menu-btn">
        Pedir uma nova Requisição
    </a>

    <a th:href="@{/historico-requisicoes}" class="menu-btn">
        Histórico de requisições
    </a>

    <a th:href="@{/minhas-solicitacoes}" class="menu-btn">
        Minhas Solicitações
    </a>

</div>

<header>
    <h1 id="titulo-header">Minhas Solicitações</h1>
</header>

<section>

    <div class="filtros">

        <input type="text" placeholder="Pesquisar Produto">

        <select>
            <option>Todos os Status</option>
            <option>Pendente</option>
            <option>Aprovada</option>
            <option>Recusada</option>
        </select>

    </div>

    <div class="tabela-box">

        <table>

            <thead>
            <tr>
                <th>Nº</th>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Data</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="tbody-solicitacoes"></tbody>

        </table>

    </div>

</section>
<script>
    let requisicoesCache = [];

    document.addEventListener("DOMContentLoaded", async () => {

        const response = await fetch("/requisicao/minhas");
        requisicoesCache = await response.json();

        renderTabela(requisicoesCache);
    });

    function renderTabela(lista) {

        const tbody = document.getElementById("tbody-solicitacoes");
        tbody.innerHTML = "";

        lista.forEach(req => {

            const produto = req.produtos?.[0]?.produto?.nomeProduto || "N/A";
            const quantidade = req.produtos?.[0]?.quantidadeSolicitada || 0;

            let statusClass = "";

            if (req.status === "APROVADO") statusClass = "status-aprovada";
            if (req.status === "PENDENTE") statusClass = "status-pendente";
            if (req.status === "NEGADO") statusClass = "status-recusada";

            const data = req.dataRequisicao
                ? new Date(req.dataRequisicao).toLocaleDateString("pt-BR")
                : "";

            const row = `
            <tr>
                <td>${req.idRequisicao}</td>
                <td>${produto}</td>
                <td>${quantidade}</td>
                <td>${data}</td>
                <td class="${statusClass}">${req.status}</td>
            </tr>
        `;

            tbody.innerHTML += row;
        });
    }

    document.querySelector(".filtros input").addEventListener("input", function () {

        const valor = this.value.toLowerCase();

        const filtrado = requisicoesCache.filter(req => {

            const produto = req.produtos?.[0]?.produto?.nomeProduto || "";

            return produto.toLowerCase().includes(valor);
        });

        renderTabela(filtrado);
    });

    document.querySelector(".filtros select").addEventListener("change", function () {

        const valor = this.value.toLowerCase();

        if (valor === "todos os status") {
            renderTabela(requisicoesCache);
            return;
        }

        const filtrado = requisicoesCache.filter(req =>
            req.status.toLowerCase() === valor
        );

        renderTabela(filtrado);
    });
</script>
</body>
</html>
