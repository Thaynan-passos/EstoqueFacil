<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Controle de Estoque - Estoque Fácil</title>
    <style>
        body { color: #333; margin: 0; background-color: #f4f6f9; font-family: Arial, Helvetica, sans-serif; }
        #painel { position: fixed; top: 0; left: 0; width: 275px; height: 100vh; background: linear-gradient(180deg, #0a4da3 0%, #032049 100%); display: flex; flex-direction: column; align-items: center; padding-top: 45px; box-shadow: 2px 0 8px rgba(0,0,0,0.25); }
        #titulo1 { color: white; font-size: 30px; margin-bottom: 8px; }
        span.subtitle { color: rgba(255,255,255,0.85); font-size: 16px; font-weight: bold; text-align: center; letter-spacing: 1px; margin-bottom: 35px; display: block; }
        .menu-btn { width: 210px; height: 42px; margin-bottom: 12px; border-radius: 4px; color: white; font-size: 14px; font-weight: bold; display: flex; align-items: center; padding-left: 18px; cursor: pointer; transition: background-color 0.2s; text-decoration: none; }
        .menu-btn:hover { background-color: rgba(255,255,255,0.12); }
        .menu-btn.active { background-color: rgba(255,255,255,0.20); }
        header { margin-left: 275px; width: calc(100% - 275px); height: 85px; background-color: #ffffff; border-bottom: 1px solid #dcdcdc; display: flex; align-items: center; padding-left: 35px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        #titulo-header { color: #1f1f1f; font-size: 28px; font-weight: bold; margin: 0; }
        section { margin-left: 305px; margin-top: 30px; margin-right: 35px; background-color: #ffffff; border-radius: 6px; padding: 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        thead { background-color: #0a4da3; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ececec; }
        #filtro { padding: 12px; width: 100%; border: 1px solid #d0d0d0; border-radius: 4px; background: #fafafa; }
    </style>
</head>
<body>

    <div id="painel">
        <h1 id="titulo1">Estoque Fácil</h1>
        <span class="subtitle">Painel Almoxarife</span>
        <a th:href="@{/dashboard-almoxarife}" class="menu-btn">Dashboard</a>
        <a th:href="@{/controle-estoque}" class="menu-btn active">Controle de Estoque</a>
        <a th:href="@{/entrada-materiais}" class="menu-btn">Entrada de Materiais</a>
        <a th:href="@{/saida-materiais}" class="menu-btn">Saída de Materiais</a>
        <a th:href="@{/inventario}" class="menu-btn">Inventário</a>
        <a th:href="@{/cadastrar-produto}" class="menu-btn">Cadastrar Produto</a>
    </div>

    <header>
        <h1 id="titulo-header">Estoque Geral</h1>
    </header>

    <section>
        <input type="text" id="filtro" placeholder="Buscar produto..." onkeyup="filtrar()">
        <table id="tabela-estoque">
            <thead>
                <tr><th>Produto</th><th>Qtd</th><th>Status</th></tr>
            </thead>
            <tbody>
                <tr><td>Mouse Dell</td><td>45</td><td>Normal</td></tr>
                <tr><td>Papel A4</td><td>5</td><td>Baixo</td></tr>
            </tbody>
        </table>
    </section>

    <script>
        function filtrar() {
            let v = document.getElementById("filtro").value.toLowerCase();
            let trs = document.getElementById("tabela-estoque").getElementsByTagName("tr");
            for (let i = 1; i < trs.length; i++) {
                trs[i].style.display = trs[i].innerText.toLowerCase().includes(v) ? "" : "none";
            }
        }
    </script>
</body>
</html>
