<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Nova Requisição</title>
</head>
<body>
    <div id="painel">
        <h1>Estoque Fácil</h1><span>Funcionário</span>
        <button class="menu-btn active">Nova Requisição</button>
    </div>
    <main>
        <header><h1>Nova Requisição</h1></header>
        <section>
            <div class="form-grid">
                <div class="form-group">
                    <label>Produto</label>
                    <input type="text" list="produtos" id="prodInput">
                    <datalist id="produtos"><option value="Mouse"><option value="Teclado"></datalist>
                </div>
                <div class="form-group">
                    <label>Qtd</label>
                    <input type="number" id="qtdInput">
                </div>
                <div class="full-width botoes-acao">
                    <button type="button" class="btn btn-primary" onclick="addCarrinho()">Adicionar ao Pedido</button>
                </div>
            </div>
            <table>
                <thead><tr><th>Produto</th><th>Qtd</th><th>Remover</th></tr></thead>
                <tbody id="lista-carrinho"></tbody>
            </table>
            <div class="botoes-acao"><button class="btn btn-success" onclick="alert('Pedido enviado!')">Finalizar Requisição</button></div>
        </section>
    </main>
    <script>
        function addCarrinho() {
            let p = document.getElementById('prodInput').value;
            let q = document.getElementById('qtdInput').value;
            if(p && q) {
                document.getElementById('lista-carrinho').innerHTML += `<tr><td>${p}</td><td>${q}</td><td><button class="btn btn-danger" onclick="this.closest('tr').remove()">X</button></td></tr>`;
            }
        }
    </script>
</body>
</html>
