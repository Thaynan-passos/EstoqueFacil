<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto - Estoque Fácil</title>
    <link rel="stylesheet" href="/static/css/cadastrar-produto.css" th:href="@{/css/cadastrar-produto.css}"/>
</head>
<body>

  <div id="painel">
    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel do Almoxarife</span>
      <a th:href="@{/dashboard-almoxarife}" class="menu-btn">Dashboard do almoxarifado</a>

      <a th:href="@{/controle-estoque}" class="menu-btn">Controle de Estoque</a>

      <a th:href="@{/entrada-materiais}" class="menu-btn">Entrada de Materiais</a>

      <a th:href="@{/saidas-materiais}" class="menu-btn">Saída de Materiais</a>

      <a th:href="@{/inventario}" class="menu-btn">Inventário do almoxarifado</a>
      <a th:href="@{/cadastrar-produto}" class="menu-btn">
          Cadastrar um Produto
      </a>

  </div>

  <header>
      <div>
          <h1 id="titulo-header">Cadastro de Produto</h1>
      </div>
  </header>

  <section>

      <div th:if="${erro}" class="mensagem-erro">
          <span th:text="${erro}"></span>
      </div>
      <form th:action="@{/produto/cadastrar}" method="post">
          <div class="form-grid">

              <div class="form-group full-width">
                  <label>Nome do Produto</label>
                  <input type="text" name="nome" required>
              </div>

              <div class="form-group">
                  <label>Código de Barras</label>
                  <input type="text" name="codigoBarras" required>
              </div>

              <div class="form-group">
                  <label>Garantia (meses)</label>
                  <input type="number" name="garantia" min="0" required>
              </div>

              <div class="form-group">
                  <label>Valor Unitário</label>
                  <input type="number" step="0.01" min="0" name="valorUnitario" required>
              </div>

              <div class="form-group">
                  <label>Classificação</label>
                  <select name="categoria" required>
                      <option value="consumo">Consumo</option>
                      <option value="manutencao">Reparo/Manutenção</option>
                      <option value="limpeza">Limpeza</option>
                  </select>
              </div>

          </div>

              <h2>Dados do Lote (opcional)</h2>
              <div class="form-grid">
                  <div class="form-group">
                      <label>Número do Lote</label>
                      <input type="number" name="numeroLote" min="1">
                  </div>
                  <div class="form-group">
                      <label>Data Fabricação</label>
                      <input type="date" name="dataFabricacao">
                  </div>
                  <div class="form-group">
                      <label>Data Validade</label>
                      <input type="date" name="dataValidade">
                  </div>
                  <div class="form-group">
                      <label>Quantidade</label>
                      <input type="number" name="quantidade" min="0">
                  </div>
                  <div class="form-group">
                      <label>Data Fornecimento</label>
                      <input type="date" name="dataFornecimento">
                  </div>
                  <div class="form-group">
                      <label>Fornecedor</label>
                      <select name="fornecedorId">
                          <option value="">-- selecione --</option>
                          <option th:each="f : ${fornecedores}" th:value="${f.idFornecedor}" th:text="${f.razaoSocial}"></option>
                      </select>
                  </div>
              </div>

              <div class="botoes-acao">
                  <button type="reset" class="btn-cancelar">Cancelar</button>
                  <button type="submit" class="btn-salvar">Cadastrar Produto</button>
              </div>
      </form>
  </section>

</body>
</html>
