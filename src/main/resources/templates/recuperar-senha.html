<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Estoque Fácil</title>
    <link rel="stylesheet"  th:href="@{/css/login.css}"/>
</head>
<body>
<div class="planoFundo">
    <section class="conteiner" id="header">

        <div th:if="${erro}" class="mensagem-erro">
            <span th:text="${erro}"></span>
        </div>


        <form th:action="@{/recuperar-senha}" method="post">

            <h1 class="h1">Recuperar Senha</h1>
            <h2 id="EstoqueFacil">Estoque Fácil</h2>

            <p class="login">Confirme seus dados para redefinir a senha</p>

            <label>Email cadastrado:</label>
            <input type="email" name="email" required>

            <div class="form-group">
                <label>Nova Senha:</label>
                <div class="senha-container">
                    <input type="password" id="novaSenha" name="novaSenha" minlength="8" maxlength="14" required>
                    <span class="olho-btn" onclick="toggleSenhaInput('novaSenha', this)">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label>Confirmar Nova Senha:</label>
                <div class="senha-container">
                    <input type="password" id="confirmarSenha" name="confirmarSenha" minlength="8" maxlength="14" required>
                    <span class="olho-btn" onclick="toggleSenhaInput('confirmarSenha', this)">👁️</span>
                </div>
            </div>

            <div class="botoes">
                <button type="submit" class="btn-entrar">Redefinir Senha</button>
            </div>

            <p style="margin-top: 15px;">
                <a th:href="@{/login}">Voltar ao login</a>
            </p>

        </form>
    </section>
</div>

<script>
    function toggleSenhaInput(inputId, icone) {
        const input = document.getElementById(inputId);

        if (input.type === 'password') {
            input.type = 'text';
            icone.textContent = '🙈'; // Ícone de escondido
        } else {
            input.type = 'password';
            icone.textContent = '👁️'; // Ícone de visível
        }
    }
</script>

</body>
</html>
