<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto - Estoque Fácil</title>

    <style>
        body { color: #333; margin: 0; background-color: #f4f6f9; font-family: Arial, Helvetica, sans-serif; }
        header { margin-left: 275px; width: calc(100% - 275px); height: 85px; background-color: #ffffff; border-bottom: 1px solid #dcdcdc; display: flex; align-items: center; padding-left: 35px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        #titulo-header { color: #1f1f1f; font-size: 28px; font-weight: bold; margin: 0; }
        #painel { position: fixed; top: 0; left: 0; width: 275px; height: 100vh; background: linear-gradient(180deg, #0a4da3 0%, #032049 100%); display: flex; flex-direction: column; align-items: center; padding-top: 45px; box-shadow: 2px 0 8px rgba(0,0,0,0.25); }
        #titulo1 { color: white; font-size: 30px; margin-bottom: 8px; }
        span.subtitle { color: rgba(255,255,255,0.85); font-size: 16px; font-weight: bold; text-align: center; letter-spacing: 1px; margin-bottom: 35px; display: block; }
        .menu-btn { width: 210px; height: 42px; margin-bottom: 12px; border-radius: 4px; color: white; font-size: 14px; font-weight: bold; display: flex; align-items: center; padding-left: 18px; cursor: pointer; transition: background-color 0.2s; text-decoration: none; }
        .menu-btn:hover { background-color: rgba(255,255,255,0.12); }
        .menu-btn.active { background-color: rgba(255,255,255,0.20); }
        section { margin-left: 305px; margin-top: 30px; margin-right: 35px; background-color: #ffffff; border-radius: 6px; padding: 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #444; }
        input, select { padding: 12px 15px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 14px; background-color: #fafafa; }
        .botoes-acao { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; border-top: 1px solid #ececec; padding-top: 25px; }
        .btn-salvar { background-color: #0a4da3; color: #ffffff; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-cancelar { background-color: #ffffff; color: #666; border: 1px solid #d0d0d0; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="painel">
        <h1 id="titulo1">Estoque Fácil</h1>
        <span class="subtitle">Painel Almoxarife</span>
        <a th:href="@{/dashboard-almoxarife}" class="menu-btn">Dashboard</a>
        <a th:href="@{/controle-estoque}" class="menu-btn">Controle de Estoque</a>
        <a th:href="@{/entrada-materiais}" class="menu-btn">Entrada de Materiais</a>
        <a th:href="@{/saida-materiais}" class="menu-btn">Saída de Materiais</a>
        <a th:href="@{/inventario}" class="menu-btn">Inventário</a>
        <a th:href="@{/cadastrar-produto}" class="menu-btn active">Cadastrar Produto</a>
    </div>

    <header>
        <h1 id="titulo-header">Cadastro de Produto</h1>
    </header>

    <section>
        <form th:action="@{/produto/cadastrar-admin}" method="post">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nome do Produto</label>
                    <input type="text" name="nome" required>
                </div>
                <div class="form-group">
                    <label>Código de Barras</label>
                    <input type="text" name="codigoProduto" required>
                </div>
                <div class="form-group">
                    <label>Garantia (meses)</label>
                    <input type="number" name="garantia" min="0" required>
                </div>
                <div class="form-group">
                    <label>Valor Unitário</label>
                    <input type="number" step="0.01" name="valorUnitario" required>
                </div>
                <div class="form-group">
                    <label>Classificação</label>
                    <select name="classificacao" required>
                        <option value="ELETRONICO">Eletrônico</option>
                        <option value="MOVEIS">Móveis</option>
                        <option value="PAPELARIA">Papelaria</option>
                        <option value="LIMPEZA">Limpeza</option>
                    </select>
                </div>
            </div>
            <div class="botoes-acao">
                <button type="reset" class="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-salvar">Cadastrar Produto</button>
            </div>
        </form>
    </section>

</body>
</html>
