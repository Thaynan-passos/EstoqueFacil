<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minhas Solicitações</title>

    <style>



        body {
            color: #ffffff;
            margin: 0;
            background-color: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            margin-left: 275px;
            width: calc(100% - 275px);
            height: 85px;
            background-color: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            display: flex;
            align-items: center;
            padding-left: 35px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        #titulo-header {
            color: #1f1f1f;
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }

        #painel {
            position: fixed;
            top: 0;
            left: 0;
            width: 275px;
            height: 100vh;
            background: linear-gradient(180deg, #0a4da3 0%, #032049 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.25);
        }

        #titulo1 {
            color: white;
            font-size: 30px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 35px;
            display: block;
        }

        .menu-btn {
            width: 210px;
            height: 42px;
            margin-bottom: 12px;
            border-radius: 4px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            padding-left: 18px;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        .menu-btn:hover {
            background-color: rgba(255,255,255,0.12);
        }

        .menu-btn.active {
            background-color: rgba(255,255,255,0.20);
        }

        section {
            margin-left: 305px;
            margin-top: 30px;
            margin-right: 35px;
            margin-bottom: 30px;
            color: #333;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #ffffff;
            border-radius: 6px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h3 {
            color: #666;
            margin: 0;
            font-size: 15px;
        }

        .card span {
            display: block;
            margin-top: 15px;
            color: #0a4da3;
            font-size: 36px;
            font-weight: bold;
        }

        .tabela-box {
            background-color: #ffffff;
            border-radius: 6px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .tabela-box h2 {
            color: #1f1f1f;
            margin-top: 0;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #0a4da3;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            color: #444;
            border-bottom: 1px solid #ececec;
        }

        tbody tr:hover {
            background-color: #f7f9fc;
        }


        .filtros {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .filtros input,
        .filtros select {
            padding: 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
        }

        .tabela-box {
            background: white;
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0a4da3;
            color: white;
        }

        th, td {
            padding: 14px;
            text-align: left;
        }

        .status-aprovada {
            color: #198754;
            font-weight: bold;
        }

        .status-pendente {
            color: #fd7e14;
            font-weight: bold;
        }

        .status-recusada {
            color: #dc3545;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div id="painel">

    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Funcionário</span>

    <a th:href="@{/dashboard-funcionario}" class="menu-btn">
        Dashboard
    </a>

    <a th:href="@{/requisicoes}" class="menu-btn">
        Nova Requisição
    </a>

    <a th:href="@{/historico-requisicoes}" class="menu-btn">
        Histórico
    </a>

    <a th:href="@{/minhas-solicitacoes}" class="menu-btn">
        Minhas Solicitações
    </a>

</div>

<header>
    <h1 id="titulo-header">Minhas Solicitações</h1>
</header>

<section>

    <div class="filtros">

        <input type="text" placeholder="Pesquisar Produto">

        <select>
            <option>Todos os Status</option>
            <option>Pendente</option>
            <option>Aprovada</option>
            <option>Recusada</option>
        </select>

    </div>

    <div class="tabela-box">

        <table>

            <thead>
            <tr>
                <th>Nº</th>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Data</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="tbody-solicitacoes"></tbody>

        </table>

    </div>

</section>
<script>
    let requisicoesCache = [];

    document.addEventListener("DOMContentLoaded", async () => {

        const response = await fetch("/requisicao");
        requisicoesCache = await response.json();

        renderTabela(requisicoesCache);
    });

    function renderTabela(lista) {

        const tbody = document.getElementById("tbody-solicitacoes");
        tbody.innerHTML = "";

        lista.forEach(req => {

            const produto = req.produtos?.[0]?.produto?.nome || "N/A";
            const quantidade = req.produtos?.[0]?.quantidadeSolicitada || 0;

            let statusClass = "";

            if (req.status === "APROVADA") statusClass = "status-aprovada";
            if (req.status === "PENDENTE") statusClass = "status-pendente";
            if (req.status === "RECUSADA") statusClass = "status-recusada";

            const data = req.dataRequisicao
                ? new Date(req.dataRequisicao).toLocaleDateString("pt-BR")
                : "";

            const row = `
            <tr>
                <td>${req.idRequisicao}</td>
                <td>${produto}</td>
                <td>${quantidade}</td>
                <td>${data}</td>
                <td class="${statusClass}">${req.status}</td>
            </tr>
        `;

            tbody.innerHTML += row;
        });
    }

    document.querySelector(".filtros input").addEventListener("input", function () {

        const valor = this.value.toLowerCase();

        const filtrado = requisicoesCache.filter(req => {

            const produto = req.produtos?.[0]?.produto?.nome || "";

            return produto.toLowerCase().includes(valor);
        });

        renderTabela(filtrado);
    });

    document.querySelector(".filtros select").addEventListener("change", function () {

        const valor = this.value.toLowerCase();

        if (valor === "todos os status") {
            renderTabela(requisicoesCache);
            return;
        }

        const filtrado = requisicoesCache.filter(req =>
            req.status.toLowerCase() === valor
        );

        renderTabela(filtrado);
    });
</script>
</body>
</html>
