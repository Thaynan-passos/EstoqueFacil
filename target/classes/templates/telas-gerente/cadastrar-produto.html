<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto - Estoque Fácil</title>

    <style>
        body {
            color: #ffffff;
            margin: 0;
            background-color: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            margin-left: 275px;
            width: calc(100% - 275px);
            height: 85px;
            background-color: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            display: flex;
            align-items: center;
            padding-left: 35px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        #titulo-header {
            color: #1f1f1f;
            font-size: 28px;
            font-weight: bold;
            margin: 0; /* Removido o espaçamento inferior já que não há mais subtítulo */
        }

        #painel {
            position: fixed;
            top: 0;
            left: 0;
            width: 275px;
            height: 100vh;
            background: linear-gradient(180deg, #0a4da3 0%, #032049 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.25);
        }

        #titulo1 {
            color: white;
            font-size: 30px;
            margin-bottom: 8px;
        }

        span.subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 35px;
            display: block;
        }

        .menu-btn {
            width: 210px;
            height: 42px;
            margin-bottom: 12px;
            border: none;
            border-radius: 4px;
            background-color: transparent;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-align: left;
            padding-left: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .menu-btn:hover {
            background-color: rgba(255,255,255,0.12);
        }

        .menu-btn.active {
            background-color: rgba(255,255,255,0.20);
        }

        section {
            margin-left: 305px;
            margin-top: 30px;
            margin-right: 35px;
            background-color: #ffffff;
            border-radius: 6px;
            padding: 35px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            color: #333;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #444;
        }

        input, select, textarea {
            padding: 12px 15px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fafafa;
            font-family: Arial, Helvetica, sans-serif;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #0a4da3;
            background-color: #ffffff;
        }

        .botoes-acao {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #ececec;
            padding-top: 25px;
        }

        .btn-salvar {
            background-color: #0a4da3;
            color: #ffffff;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-salvar:hover {
            background-color: #032049;
        }

        .btn-cancelar {
            background-color: #ffffff;
            color: #666;
            border: 1px solid #d0d0d0;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancelar:hover {
            background-color: #f1f3f5;
            color: #333;
        }
    </style>
</head>
<body>

  <div id="painel">
    <h1 id="titulo1">Estoque Fácil</h1>
    <span class="subtitle">Painel Administrativo</span>
      <a th:href="@{/dashboard-gerente}" class="menu-btn">
          Dashboard
      </a>

      <a th:href="@{/produtos-solicitados}" class="menu-btn">
          Produtos Solicitados
      </a>

      <a th:href="@{/analise-solicitacoes}" class="menu-btn">
          Análise de Solicitações
      </a>

      <a th:href="@{/cadastrar-produto}" class="menu-btn active">
          Cadastrar Produto
      </a>

      <a th:href="@{/cadastro-funcionario}" class="menu-btn">
          Cadastrar Funcionário
      </a>
  </div>

  <header>
      <div>
          <h1 id="titulo-header">Cadastro de Produto</h1>
      </div>
  </header>

  <section>
      <form action="#" method="POST">
          <div class="form-grid">
              
              <div class="form-group full-width">
                  <label for="nomeProduto">Nome do Produto</label>
                  <input type="text" id="nomeProduto" name="nomeProduto" placeholder="Ex: Cadeira de Escritório Ergonômica" required>
              </div>

              <div class="form-group full-width">
                  <label for="descricao">Descrição</label>
                  <textarea id="descricao" name="descricao" placeholder="Detalhes técnicos, cor, marca, etc." required></textarea>
              </div>

              <div class="form-group">
                  <label for="quantidade">Quantidade em Estoque</label>
                  <input type="number" id="quantidade" name="quantidade" min="0" placeholder="0" required>
              </div>

              <div class="form-group">
                  <label for="valorUnitario">Valor Unitário (R$)</label>
                  <input type="number" step="0.01" id="valorUnitario" name="valorUnitario" min="0" placeholder="0,00" required>
              </div>

              <div class="form-group">
                  <label for="fornecedor">Fornecedor</label>
                  <select id="fornecedor" name="fornecedor" required>
                      <option value="" disabled selected>Selecione o fornecedor...</option>
                      <option value="1">Dell Computadores</option>
                      <option value="2">Kalunga Materiais</option>
                      <option value="3">Giroflex Cadeiras</option>
                  </select>
              </div>
              
              <div class="form-group">
                  <label for="categoria">Categoria do Material</label>
                  <select id="categoria" name="categoria" required>
                      <option value="" disabled selected>Selecione a categoria...</option>
                      <option value="eletronicos">Eletrônicos e Informática</option>
                      <option value="moveis">Móveis e Decoração</option>
                      <option value="papelaria">Papelaria e Escritório</option>
                      <option value="limpeza">Material de Limpeza</option>
                  </select>
              </div>

          </div>

          <div class="botoes-acao">
              <button type="button" class="btn-cancelar">Cancelar</button>
              <button type="submit" class="btn-salvar">Cadastrar Produto</button>
          </div>
      </form>
  </section>

</body>
</html>
