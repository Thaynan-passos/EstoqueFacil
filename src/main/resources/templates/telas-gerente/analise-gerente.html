<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
    <title>Análise de Solicitações</title>
</head>
<body>
    <div id="painel">
        <h1>Estoque Fácil</h1><span>Gerência</span>
        <button class="menu-btn active">Análise de Solicitações</button>
    </div>
    <main>
        <header><h1>Aprovação de Materiais</h1></header>
        <section>
            <input type="text" id="filtro" placeholder="Digite para filtrar por item ou solicitante..." onkeyup="filtrar()" style="margin-bottom: 20px; padding: 10px; width: 100%;">
            <table id="tabela-analise">
                <thead><tr><th>Pedido</th><th>Item</th><th>Solicitante</th><th>Qtd</th><th>Ações</th></tr></thead>
                <tbody>
                    <tr><td>REQ-101</td><td>Mouse Dell</td><td>Carlos (TI)</td><td>2</td>
                        <td><button class="btn btn-success" onclick="this.closest('tr').remove()">Aprovar</button>
                        <button class="btn btn-danger" onclick="this.closest('tr').remove()">Rejeitar</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <script>
        function filtrar() {
            let v = document.getElementById("filtro").value.toLowerCase();
            let trs = document.getElementById("tabela-analise").getElementsByTagName("tr");
            for (let i = 1; i < trs.length; i++) {
                trs[i].style.display = trs[i].innerText.toLowerCase().includes(v) ? "" : "none";
            }
        }
    </script>
</body>
</html>
