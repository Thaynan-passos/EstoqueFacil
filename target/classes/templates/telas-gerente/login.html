
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Estoque Fácil</title>
    <style>
        body {
            color: #ffffff;
            margin: 0;
            background-color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .planoFundo {
            background-image: url("https://fabrimetalarmazenagem.com.br/wp-content/uploads/2025/06/Fabrimetal-Pauta-1-Prateleiras-industriais-solucao-pratica-para-a-eficiencia-do-almoxarifado.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .planoFundo::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://fabrimetalarmazenagem.com.br/wp-content/uploads/2025/06/Fabrimetal-Pauta-1-Prateleiras-industriais-solucao-pratica-para-a-eficiencia-do-almoxarifado.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            filter: blur(5px);
            transform: scale(1.1);
            z-index: -1;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            color: #b6cbff;
            margin-bottom: 10px;
            margin-top: 0;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .login {
            text-align: center;
            color: white;
            margin-bottom: 25px;
            font-size: 14px;
        }

        form {
            width: 350px;
            padding: 35px 25px;
            background: #0a4da3;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: Arial, sans-serif;
            color: white;
            z-index: 1;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            border: 2px solid #4da6ff;
        }

        .botoes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-entrar {
            background-color: #ffffff;
            color: #0a4da3;
            padding: 10px 30px;
        }

        .btn-entrar:hover {
            background-color: #e6e6e6;
        }

        .btn-resgatar {
            background-color: transparent;
            color: #b6cbff;
            padding: 0;
            font-weight: normal;
        }

        .btn-resgatar:hover {
            text-decoration: underline;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="planoFundo">
        <section class="conteiner" id="header">
            <form action="#" method="POST">
                <h1 class="h1">Login</h1>
                <h2 id="EstoqueFacil">Estoque Fácil</h2>
                <p class="login">Faça o login para continuar</p>

                <label th:for="funcionario">CPF do funcionário:</label>
                <input type="text" name="funcionario" id="funcionario" placeholder="000.000.000-00" required>

                <label th:for="senhaFuncionario">Senha:</label>
                <input type="password" name="senhaFuncionario" id="senhaFuncionario" placeholder="••••••••" required>

                <div class="botoes">
                    <a href="/cadastro-funcionario" class="btn-resgatar" style="text-decoration:none;display:inline-block;line-height:34px">Cadastrar Funcionário</a>
                    <button type="submit" class="btn-entrar">Entrar</button>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
