<!DOCTYPE html>
<html xmlns:th="<http://www.thymeleaf.org>">
<head>
    <meta charset="UTF-8">
    <title th:text=""></title>
    <style>

        body{
            color: #ffffff;
            margin: 0;
            background-color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .planoFundo{

            background-image: url("https://fabrimetalarmazenagem.com.br/wp-content/uploads/2025/06/Fabrimetal-Pauta-1-Prateleiras-industriais-solucao-pratica-para-a-eficiencia-do-almoxarifado.jpg");
            background-size: cover;
            background-position:  center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .planoFundo::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://fabrimetalarmazenagem.com.br/wp-content/uploads/2025/06/Fabrimetal-Pauta-1-Prateleiras-industriais-solucao-pratica-para-a-eficiencia-do-almoxarifado.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            filter: blur(10px); /* Desfoca apenas a imagem */
            transform: scale(1.1); /* Remove bordas brancas causadas pelo blur */
            z-index: -1; /* Garante que a imagem fique atrás do formulário */
            }

        h1 {
            text-align:center;
            font-size: 3rem;
            color: #b6cbff;
            margin-bottom: 10px;
            }

        h2{
            text-align:center;
            color: white;
            margin-bottom: 10px;
            }

        .login{
            text-align: center;
            color: white;
            margin-bottom: 15px;
            }

        form {
            width: 350px;
            margin: 45px auto;
            padding: 25px;
            background: #0a4da3;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: Arial, sans-serif;
            color: white;
        }



        .planoFundo::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://fabrimetalarmazenagem.com.br/wp-content/uploads/2025/06/Fabrimetal-Pauta-1-Prateleiras-industriais-solucao-pratica-para-a-eficiencia-do-almoxarifado.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            filter: blur(5px); /* Desfoca apenas a imagem */
            transform: scale(1.1); /* Remove bordas brancas causadas pelo blur */
            z-index: -1; /* Garante que a imagem fique atrás do formulário */
        }

        h1 {
            text-align:center;
            font-size: 3rem;
            color: #b6cbff;
            margin-bottom: 10px;
        }

        h2{
            text-align:center;
            color: white;
            margin-bottom: 10px;
        }

        .login{
            text-align: center;
            color: white;
            margin-bottom: 15px;
        }

        form {
            width: 350px;
            margin: 45px auto;
            padding: 25px;
            background: #0a4da3;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: Arial, sans-serif;

            color: white;
        }


        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        input:focus,
        textarea:focus {
            border: 2px solid #4da6ff;
        }

        button {

            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin:20px;
            transition: 0.3s;
        }

    </style>
</head>
<body>
    <div class="planoFundo">

        <section class="conteiner" id="header">
            <form>

                <h1 class="h1" th:text="">Login</h1>
                <h2 id="EstoqueFacil" th:text="">Estoque Facil</h2>
                <p class="login">Faça o login para continuar</p>

                <label th:for="funcionario">CPF do funcionário:</label>
                <input type="textarea" name="funcionario" required>

                <label th:for="senhaFuncionario">Senha:</label>
                <input type="textarea" name="senhaFuncionario" required>

                <button>Resgatar Senha?</button>
                <button>Entrar</button>
            </form>
        </section>
    </div>
</body>
</html>
