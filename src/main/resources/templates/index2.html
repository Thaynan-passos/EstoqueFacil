<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>Produtos Solicitados</title>
</head>
<body>
    <div id="painel">
        <h1>Estoque Fácil</h1><span>Painel Administrativo</span>
        <button class="menu-btn">DashBoard</button>
        <button class="menu-btn active">Produtos solicitados</button>
        <button class="menu-btn">Aprovações Pendentes</button>
    </div>
    <main>
        <header>
            <h1>Produtos solicitados pelo Almoxarifado</h1>
            <p>Gerencie solicitações pendentes</p>
        </header>
        <section>
            <input type="text" id="filtro" placeholder="Filtrar por nome ou setor..." onkeyup="filtrar()" style="padding:10px; width:100%; margin-bottom:20px;">
            <table id="tabela-solicitacoes">
                <thead><tr><th>Código</th><th>Solicitante</th><th>Produto</th><th>Status</th></tr></thead>
                <tbody>
                    <tr><td>001</td><td>Gabriel</td><td>Mouse</td><td><span class="badge b-pendente">Pendente</span></td></tr>
                </tbody>
            </table>
        </section>
    </main>
    <script>
        function filtrar() {
            let v = document.getElementById("filtro").value.toLowerCase();
            let trs = document.getElementById("tabela-solicitacoes").getElementsByTagName("tr");
            for (let i = 1; i < trs.length; i++) {
                trs[i].style.display = trs[i].innerText.toLowerCase().includes(v) ? "" : "none";
            }
        }
    </script>
</body>
</html>
